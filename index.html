  <script>
    const products = [
      { id: 1, name: 'Tiger Nut Milk', category: 'Non-Carbonated', price: 800, emoji: '🥛' },
      { id: 2, name: 'Fanta Orange', category: 'Carbonated', price: 500, emoji: '🧡' },
      { id: 3, name: 'Sprite', category: 'Carbonated', price: 500, emoji: '🟢' },
      { id: 4, name: 'Coca-Cola', category: 'Carbonated', price: 500, emoji: '🔴' },
      { id: 5, name: 'Zobo Juice', category: 'Non-Carbonated', price: 400, emoji: '🍷' },
      { id: 6, name: 'Yogurt Drink', category: 'Dairy', price: 1200, emoji: '🥄' },
      { id: 7, name: 'Bottled Water', category: 'Water', price: 200, emoji: '💧' },
    ];

    let cart = [];

    const productsContainer = document.getElementById('productsContainer');
    const cartBtn = document.getElementById('cartBtn');
    const closeCart = document.getElementById('closeCart');
    const overlay = document.getElementById('overlay');
    const cartPanel = document.getElementById('cartPanel');
    const cartCount = document.getElementById('cartCount');
    const cartContent = document.getElementById('cartContent');
    const subtotalEl = document.getElementById('subtotal');
    const shippingEl = document.getElementById('shipping');
    const totalEl = document.getElementById('total');
    const checkoutBtn = document.getElementById('checkoutBtn');

    function renderProducts() {
      productsContainer.innerHTML = `
        <h2 class="section-title">Cold Drinks Menu</h2>
        <div class="products-grid">
          ${products.map(product => `
            <div class="product-card">
              <div class="product-emoji">${product.emoji}</div>
              <div class="product-name">${product.name}</div>
              <div class="product-category">${product.category}</div>
              <div class="product-footer">
                <div class="product-price">₦${product.price.toLocaleString()}</div>
                <button class="add-btn" onclick="addToCart(${product.id})">
                  <i data-lucide="plus" style="width: 16px; height: 16px;"></i>
                  Add
                </button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      lucide.createIcons();
    }

    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      const cartItem = cart.find(item => item.id === productId);

      if (cartItem) {
        cartItem.quantity++;
      } else {
        cart.push({ ...product, quantity: 1 });
      }

      updateCart();
    }

    function updateCart() {
      cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
      renderCartItems();
      updateSummary();
    }

    function renderCartItems() {
      if (cart.length === 0) {
        cartContent.innerHTML = `
          <div class="cart-empty">
            <i data-lucide="shopping-cart" style="width: 48px; height: 48px; color: #374151;"></i>
            <p>Your cart is empty</p>
          </div>
        `;
      } else {
        const deliveryHtml = renderDeliveryOptions();
        cartContent.innerHTML = `
          ${deliveryHtml}
          <div class="cart-items">
            ${cart.map(item => `
              <div class="cart-item">
                <div class="cart-item-info">
                  <div class="cart-item-name">${item.name}</div>
                  <div class="cart-item-controls">
                    <button class="qty-btn" onclick="decreaseQty(${item.id})">−</button>
                    <div class="qty-display">${item.quantity}</div>
                    <button class="qty-btn" onclick="increaseQty(${item.id})">+</button>
                  </div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
                  <div class="cart-item-price">₦${(item.price * item.quantity).toLocaleString()}</div>
                  <button class="remove-btn" onclick="removeFromCart(${item.id})">Remove</button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }
      lucide.createIcons();
    }

    function increaseQty(productId) {
      const item = cart.find(item => item.id === productId);
      if (item) item.quantity++;
      updateCart();
    }

    function decreaseQty(productId) {
      const item = cart.find(item => item.id === productId);
      if (item && item.quantity > 1) item.quantity--;
      else if (item) removeFromCart(productId);
      updateCart();
    }

    function removeFromCart(productId) {
      cart = cart.filter(item => item.id !== productId);
      updateCart();
    }

    function updateSummary() {
      const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const shipping = cart.length > 0 ? 500 : 0;
      const total = subtotal + shipping;

      subtotalEl.textContent = `₦${subtotal.toLocaleString()}`;
      shippingEl.textContent = `₦${shipping.toLocaleString()}`;
      totalEl.textContent = `₦${total.toLocaleString()}`;
    }

    cartBtn.addEventListener('click', () => {
      cartPanel.classList.add('open');
      overlay.classList.add('open');
    });

    closeCart.addEventListener('click', () => {
      cartPanel.classList.remove('open');
      overlay.classList.remove('open');
    });

    overlay.addEventListener('click', () => {
      cartPanel.classList.remove('open');
      overlay.classList.remove('open');
    });

    let selectedDelivery = null;

    const deliveryOptions = [
      { area: 'Gwandong FTZ', cost: 600 },
      { area: 'Ibgesa', cost: 1000 },
      { area: 'Lusada', cost: 1500 }
    ];

    function renderDeliveryOptions() {
      const deliveryHtml = `
        <div style="background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); border-radius: 8px; padding: 12px; margin-bottom: 16px;">
          <div style="color: #9ca3af; margin-bottom: 10px; font-weight: 600;">
            Delivery Location (Optional):
          </div>
          ${deliveryOptions.map((option, idx) => `
            <button style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; padding: 10px; border-radius: 6px; transition: all 0.2s; width: 100%; border: 1.5px solid ${selectedDelivery === idx ? '#22c55e' : 'rgba(34, 197, 94, 0.2)'}; background: ${selectedDelivery === idx ? 'rgba(34, 197, 94, 0.15)' : 'rgba(34, 197, 94, 0.05)'};" onmouseover="this.style.background='rgba(34, 197, 94, 0.1)'" onmouseout="this.style.background='${selectedDelivery === idx ? 'rgba(34, 197, 94, 0.15)' : 'rgba(34, 197, 94, 0.05)'}'" onclick="toggleDelivery(${idx})">
              <i data-lucide="${selectedDelivery === idx ? 'check-circle' : 'circle'}" style="width: 18px; height: 18px; color: #22c55e; flex-shrink: 0;"></i>
              <span style="color: #e5e7eb; flex: 1; font-size: 13px; text-align: left;">${option.area}</span>
              <span style="color: #22c55e; font-weight: 600; font-size: 13px;">₦${option.cost}</span>
            </button>
          `).join('')}
        </div>
      `;
      return deliveryHtml;
    }

    function toggleDelivery(index) {
      if (selectedDelivery === index) {
        selectedDelivery = null;
      } else {
        selectedDelivery = index;
      }
      renderCartItems();
      updateSummary();
    }

    function updateSummary() {
      const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const shipping = selectedDelivery !== null ? deliveryOptions[selectedDelivery].cost : 0;
      const total = subtotal + shipping;

      subtotalEl.textContent = `₦${subtotal.toLocaleString()}`;
      shippingEl.textContent = `₦${shipping.toLocaleString()}`;
      totalEl.textContent = `₦${total.toLocaleString()}`;
    }

    const paymentModal = document.getElementById('paymentModal');
    const opayPayBtn = document.getElementById('opayPayBtn');
    const whatsappPayBtn = document.getElementById('whatsappPayBtn');
    const cancelPaymentBtn = document.getElementById('cancelPaymentBtn');

    function getOrderTotal() {
      const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const shipping = selectedDelivery !== null ? deliveryOptions[selectedDelivery].cost : 0;
      return subtotal + shipping;
    }

    function getDeliveryInfo() {
      if (selectedDelivery !== null) {
        const shipping = deliveryOptions[selectedDelivery].cost;
        return `\nDelivery: ${deliveryOptions[selectedDelivery].area} (₦${shipping})`;
      } else {
        return '\n(Shop pickup - no delivery)';
      }
    }

    checkoutBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (cart.length > 0) {
        paymentModal.classList.add('open');
      }
    });

    opayPayBtn.addEventListener('click', () => {
      const total = getOrderTotal();
      const opayLink = `https://opayme.com/pay/8144899449/${total}`;
      window.open(opayLink, '_blank', 'noopener,noreferrer');
      
      setTimeout(() => {
        cart = [];
        selectedDelivery = null;
        updateCart();
        cartPanel.classList.remove('open');
        overlay.classList.remove('open');
        paymentModal.classList.remove('open');
      }, 500);
    });

    whatsappPayBtn.addEventListener('click', () => {
      const total = getOrderTotal();
      const deliveryInfo = getDeliveryInfo();
      const orderSummary = cart.map(item => `${item.name} x${item.quantity}`).join(', ');
      const whatsappMessage = `Hi! I want to order: ${orderSummary}${deliveryInfo}\nTotal: ₦${total.toLocaleString()}`;
      
      window.open(`https://wa.me/2348144899449?text=${encodeURIComponent(whatsappMessage)}`, '_blank');
      
      cart = [];
      selectedDelivery = null;
      updateCart();
      cartPanel.classList.remove('open');
      overlay.classList.remove('open');
      paymentModal.classList.remove('open');
    });

    cancelPaymentBtn.addEventListener('click', () => {
      paymentModal.classList.remove('open');
    });

    renderProducts();
